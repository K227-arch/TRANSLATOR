version: "3.9"

# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars (set in shell or a .env file at this directory):
#   API_URL        — public URL of the backend, e.g. https://api.yourdomain.com
#   CORS_ORIGINS   — comma-separated allowed frontend origins, e.g. https://yourdomain.com
#   OLLAMA_MODEL   — model name, default llama3.2:3b

services:
  backend:
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
    restart: always

  ollama:
    restart: always

  ollama-pull:
    environment:
      - OLLAMA_HOST=http://ollama:11434
