services:
  - type: web
    name: lunyoro-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    rootDir: .
    envVars:
      - key: CORS_ORIGINS
        # Set to your Vercel frontend URL
        value: https://lunyoro-translator.vercel.app
      - key: OLLAMA_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: qwen2.5:3b
      - key: TRANSFORMERS_OFFLINE
        value: "0"
      - key: HF_DATASETS_OFFLINE
        value: "0"
      - key: HF_HUB_OFFLINE
        value: "0"
      - key: HF_TOKEN
        sync: false   # set this in Render dashboard
      - key: DOWNLOAD_MODELS_ON_START
        value: "1"
    disk:
      name: models
      mountPath: /app/model
      sizeGB: 25

  - type: web
    name: lunyoro-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm start
    rootDir: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://lunyoro-backend.onrender.com
